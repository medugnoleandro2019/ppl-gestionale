<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>PPL · SOP & Documenti</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ══ TOKENS ══ */
:root{
  --bk:#0A0A0A;--g1:#111;--g2:#181818;--g3:#222;--g4:#2E2E2E;--g5:#3A3A3A;--g6:#555;
  --gold:#B8972A;--gold2:#D4AF45;--goldd:#6B5518;
  --teal:#2E9B9B;--vio:#9A7ACC;--grn:#4DBD74;--red:#E05C5C;--org:#E08C3A;
  --wh:#F5F0E8;--mu:#888;--mu2:#AAA;
  --sidebar:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bk);color:var(--wh);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100%;}

/* ══ LAYOUT ══ */
.shell{display:flex;height:calc(100vh - 40px);overflow:hidden;}

/* ══ SIDEBAR ══ */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--g1);border-right:1px solid var(--g3);
  display:flex;flex-direction:column;
  z-index:200;
  transition:width .22s ease;
  overflow:hidden;min-width:0;
}
.sidebar.collapsed{width:48px;}
.sb-logo{
  padding:12px 10px;border-bottom:1px solid var(--g3);
  display:flex;align-items:center;gap:8px;height:52px;flex-shrink:0;
}
.sb-logo-text{overflow:hidden;white-space:nowrap;flex:1;transition:opacity .15s .05s;}
.sidebar.collapsed .sb-logo-text{opacity:0;width:0;flex:0;transition:opacity .05s;}
.sb-brand{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;
  letter-spacing:4px;color:var(--gold);text-transform:uppercase;line-height:1;}
.sb-sub{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:3px;
  color:var(--mu);text-transform:uppercase;margin-top:3px;}
.sb-toggle{
  background:none;border:1px solid var(--g4);color:var(--mu2);
  width:28px;height:28px;min-width:28px;border-radius:3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:.15s;flex-shrink:0;
}
.sb-toggle:hover{border-color:var(--gold);color:var(--gold);}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;overflow-x:hidden;}
.sb-section{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:3px;
  color:var(--g6);text-transform:uppercase;padding:12px 14px 5px;
  white-space:nowrap;overflow:hidden;transition:opacity .1s;}
.sidebar.collapsed .sb-section{opacity:0;}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  font-size:12px;color:var(--mu2);
  border-left:2px solid transparent;
  transition:.15s;user-select:none;white-space:nowrap;overflow:hidden;
}
.sb-item:hover{color:var(--wh);background:var(--g2);}
.sb-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(184,151,42,.06);}
.sb-icon{font-size:16px;width:20px;min-width:20px;text-align:center;flex-shrink:0;}
.sb-label{flex:1;overflow:hidden;white-space:nowrap;transition:opacity .1s;}
.sidebar.collapsed .sb-label{opacity:0;width:0;overflow:hidden;}
.sidebar.collapsed .sb-badge{display:none;}
.sb-badge{font-family:'DM Mono',monospace;font-size:8px;background:var(--g4);
  color:var(--mu);padding:1px 5px;border-radius:2px;flex-shrink:0;}
.sb-badge.new{background:var(--goldd);color:var(--gold2);}
.sb-footer{padding:12px 10px;border-top:1px solid var(--g3);overflow:hidden;flex-shrink:0;}
.sb-foot-t{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--g6);
  white-space:nowrap;transition:opacity .1s;}
.sidebar.collapsed .sb-foot-t{opacity:0;}
/* mobile overlay */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150;}
.sb-overlay.visible{display:block;}

/* ══ CONTENT AREA ══ */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.topbar{
  background:var(--g1);border-bottom:1px solid var(--g3);
  padding:0 22px;height:48px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.topbar-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;
  color:var(--gold);text-transform:uppercase;}
.topbar-sep{width:1px;height:20px;background:var(--g4);}
.tb-sp{flex:1;}
.tbtn{background:var(--g3);border:1px solid var(--g4);color:var(--mu2);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:5px 12px;border-radius:3px;cursor:pointer;transition:.15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--gold);color:var(--gold);}
.tbtn.pri{background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold;}
.tbtn.pri:hover{background:var(--gold2);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--g5);transition:.3s;flex-shrink:0;}
.sdot.uns{background:var(--org);}.sdot.sav{background:var(--grn);}

.panel-area{flex:1;overflow-y:auto;overflow-x:hidden;}
.tab-panel{display:none;height:100%;}
.tab-panel.active{display:block;}

/* ══ SHARED COMPONENTS ══ */
.main{max-width:1380px;margin:0 auto;padding:18px 22px 60px;}
.slbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:10px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--g3);}
.slbl:first-child{margin-top:0;}
.btn{background:var(--g3);border:1px solid var(--g4);color:var(--mu2);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:5px 12px;border-radius:3px;cursor:pointer;transition:.15s;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn.pri{background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold;}
.btn.pri:hover{background:var(--gold2);}

/* ══ DASHBOARD KPI ══ */
.krow{display:flex;gap:10px;flex-wrap:wrap;}
.kc{flex:1;min-width:150px;background:var(--g1);border:1px solid var(--g3);
  border-radius:4px;padding:12px 14px;border-top:2px solid var(--g4);}
.kc.grn{border-top-color:var(--grn);}.kc.org{border-top-color:var(--org);}
.kc.red{border-top-color:var(--red);}.kc.neu{border-top-color:var(--g4);}
.klbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;
  color:var(--mu);text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;}
.dot.grn{background:var(--grn);}.dot.org{background:var(--org);}
.dot.red{background:var(--red);}.dot.neu{background:var(--g5);}
.kval{font-family:'DM Mono',monospace;font-size:24px;line-height:1;color:var(--wh);font-weight:500;}
.kval.dim{color:var(--mu);}
.ksub{font-size:10px;color:var(--mu);margin-top:5px;display:flex;justify-content:space-between;}
.kdelta{font-family:'DM Mono',monospace;font-size:10px;}
.kdelta.pos{color:var(--grn);}.kdelta.neg{color:var(--red);}
.crow{display:flex;gap:10px;margin-bottom:2px;flex-wrap:wrap;}
.cb{background:var(--g1);border:1px solid var(--g3);border-radius:4px;padding:14px 16px;min-width:0;}
.cb.f2{flex:2 1 300px;}.cb.f1{flex:1 1 200px;}
.cbtitle{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;
  color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
.cbwrap{position:relative;height:150px;}
.panels{display:flex;gap:10px;flex-wrap:wrap;}
.panel{background:var(--g1);border:1px solid var(--g3);border-radius:4px;overflow:hidden;flex:1;min-width:280px;}
.ph{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--g3);}
.ph-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.ph-arr{color:var(--mu);font-size:11px;}
.pb{padding:14px;}.pb.closed{display:none;}
.fg{display:flex;flex-wrap:wrap;gap:8px;}
.fi{display:flex;flex-direction:column;gap:3px;min-width:95px;flex:1;}
.fi.w2{min-width:200px;flex:2;}
.filab{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--mu);text-transform:uppercase;}
.finp{background:var(--g2);border:1px solid var(--g4);border-radius:3px;
  color:var(--wh);font-family:'DM Mono',monospace;font-size:12px;
  padding:6px 8px;outline:none;width:100%;transition:border-color .15s;}
.finp:focus{border-color:var(--gold);}
.finp::placeholder{color:var(--g5);}
.finp.ta{resize:vertical;min-height:50px;font-family:'DM Sans',sans-serif;font-size:11px;}
.fdiv{width:100%;height:1px;background:var(--g3);flex-basis:100%;margin:4px 0;}
.fsubl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;
  color:var(--vio);text-transform:uppercase;flex-basis:100%;padding-top:4px;}
.irow{display:flex;gap:10px;flex-wrap:wrap;}
.ins{flex:1;min-width:210px;background:var(--g1);border:1px solid var(--g3);
  border-radius:4px;padding:11px 13px;border-left:3px solid;}
.ins.grn{border-left-color:var(--grn);}.ins.org{border-left-color:var(--org);}
.ins.red{border-left-color:var(--red);}.ins.inf{border-left-color:var(--vio);}
.ins-t{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.ins.grn .ins-t{color:var(--grn);}.ins.org .ins-t{color:var(--org);}
.ins.red .ins-t{color:var(--red);}.ins.inf .ins-t{color:var(--vio);}
.ins-m{font-size:11px;color:var(--mu2);line-height:1.55;}
.htw{background:var(--g1);border:1px solid var(--g3);border-radius:4px;overflow-x:auto;}
.ht{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;}
.ht th{background:var(--g2);padding:8px 11px;font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;
  text-align:right;border-bottom:1px solid var(--g3);}
.ht th:first-child{text-align:left;}
.ht td{padding:8px 11px;border-bottom:1px solid var(--g2);text-align:right;
  font-family:'DM Mono',monospace;color:var(--mu2);}
.ht td:first-child{text-align:left;color:var(--wh);font-weight:bold;}
.ht tr:last-child td{border-bottom:none;}
.ht tr.act td{background:rgba(184,151,42,.05);}
.cg{color:var(--grn)!important;}.cr{color:var(--red)!important;}
.co{color:var(--gold)!important;}.co2{color:var(--org)!important;}

/* ══ RESPONSIVE MOBILE ══ */
@media(max-width:700px){
  :root{ --sidebar:200px; }
  .main{ padding:12px 12px 60px; }
  .kc{ min-width:calc(50% - 5px); }
  .kval{ font-size:20px; }
  .cb.f2,.cb.f1{ flex:1 1 100%; }
  .cbwrap{ height:130px; }
  .panel{ min-width:100%; }
  .ins{ min-width:100%; }
  .topbar{ padding:0 10px; gap:6px; }
  .topbar-sep{ display:none; }
  .tbtn{ font-size:8px; padding:5px 7px; letter-spacing:0; }
  .topbar-title{ font-size:9px; letter-spacing:1px; }
  .mnav{ gap:4px; }
  .mnavlabel{ min-width:70px; font-size:11px; }
  .mnavbtn{ width:26px; height:26px; }
  .sdot{ display:none; }
  .hide-xs{ display:none; }
  .prog-input-row{ flex-direction:column; }
  .prog-inp-group{ min-width:100%; }
  .bat-opt{ min-width:60px; }
  .vfi{ min-width:calc(50% - 4px); }
  .cli-card{ min-width:calc(50% - 5px); }
}
/* month nav */
.mnav{display:flex;align-items:center;gap:8px;}
.mnavbtn{background:var(--g3);border:1px solid var(--g4);color:var(--mu2);
  width:30px;height:30px;border-radius:3px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:.15s;}
.mnavbtn:hover{border-color:var(--gold);color:var(--gold);}
.mnavlabel{font-family:'DM Mono',monospace;font-size:12px;font-weight:bold;
  color:var(--wh);letter-spacing:1px;min-width:100px;text-align:center;}
/* settings modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;
  align-items:center;justify-content:center;}
.ov.open{display:flex;}
.mod{background:var(--g1);border:1px solid var(--g3);border-radius:6px;
  width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.mh{padding:15px 20px;border-bottom:1px solid var(--g3);
  display:flex;justify-content:space-between;align-items:center;}
.mh-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;}
.mx{background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;}
.mx:hover{color:var(--wh);}
.mb{padding:18px 20px;}.ms{margin-bottom:16px;}
.ms-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;
  color:var(--vio);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--g3);}
.mgrid{display:flex;flex-wrap:wrap;gap:10px;}
.mf{flex:1;min-width:130px;display:flex;flex-direction:column;gap:3px;}
.mflab{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--mu);text-transform:uppercase;}
.mfinp{background:var(--g2);border:1px solid var(--g4);border-radius:3px;
  color:var(--wh);font-family:'DM Mono',monospace;font-size:12px;padding:6px 9px;outline:none;width:100%;}
.mfinp:focus{border-color:var(--gold);}
.mfhint{font-size:10px;color:var(--mu);margin-top:2px;font-style:italic;}
.mfoot{padding:12px 20px;border-top:1px solid var(--g3);display:flex;justify-content:flex-end;gap:8px;}

/* ══ VALUTAZIONE ══ */
.val-wrap{padding:20px 22px 60px;max-width:900px;margin:0 auto;}
.val-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.client-select-bar{background:var(--g1);border:1px solid var(--g3);border-radius:4px;
  padding:14px 16px;margin-bottom:16px;}
.client-select-bar select{background:var(--g2);border:1px solid var(--g4);color:var(--wh);
  font-family:'DM Mono',monospace;font-size:11px;padding:5px 8px;border-radius:3px;outline:none;width:200px;}
.client-select-bar select:focus{border-color:var(--gold);}
/* Form fields */
.vform-section{background:var(--g1);border:1px solid var(--g3);border-radius:4px;
  margin-bottom:10px;overflow:hidden;}
.vform-head{padding:10px 14px;border-bottom:1px solid var(--g3);display:flex;
  justify-content:space-between;align-items:center;cursor:pointer;}
.vform-head-t{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.vform-body{padding:14px;}
.vfg{display:flex;flex-wrap:wrap;gap:8px;}
.vfi{display:flex;flex-direction:column;gap:3px;min-width:110px;flex:1;}
.vfi.w3{min-width:240px;flex:3;}
.vfl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--mu);text-transform:uppercase;}
.vfinp{background:var(--g2);border:1px solid var(--g4);border-radius:3px;
  color:var(--wh);font-family:'DM Sans',sans-serif;font-size:11px;
  padding:6px 8px;outline:none;width:100%;transition:.15s;}
.vfinp:focus{border-color:var(--gold);}
.vfinp.ta{resize:vertical;min-height:55px;}
/* battery */
.bat-row{display:flex;gap:8px;flex-wrap:wrap;}
.bat-opt{flex:1;min-width:80px;background:var(--g2);border:1px solid var(--g4);
  border-radius:4px;padding:10px 8px;text-align:center;cursor:pointer;transition:.15s;}
.bat-opt:hover{border-color:var(--gold2);}
.bat-opt.active{border-color:var(--gold);background:rgba(184,151,42,.08);}
.bat-letter{font-family:'DM Mono',monospace;font-size:20px;font-weight:bold;color:var(--gold);line-height:1;}
.bat-name{font-size:9px;color:var(--mu2);margin-top:3px;line-height:1.3;}
/* tags */
.tag{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px;cursor:pointer;
  border:1px solid var(--g4);color:var(--mu2);transition:.15s;margin:3px 3px 3px 0;}
.tag:hover{border-color:var(--gold2);color:var(--wh);}
.tag.active{background:rgba(184,151,42,.15);border-color:var(--gold);color:var(--gold);}
.tag.red{border-color:rgba(224,92,92,.4);color:#E05C5C;}
.tag.red.active{background:rgba(224,92,92,.15);border-color:var(--red);}
/* test table */
.test-table{width:100%;border-collapse:collapse;font-size:11px;}
.test-table th{background:var(--g2);padding:7px 10px;font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;
  border-bottom:1px solid var(--g3);text-align:left;}
.test-table th:last-child{text-align:right;}
.test-table td{padding:8px 10px;border-bottom:1px solid var(--g2);vertical-align:middle;}
.test-table tr:last-child td{border-bottom:none;}
.test-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);width:20px;display:inline-block;}
.test-name{font-weight:500;font-size:11px;}
.test-unit{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);margin-top:1px;}
.test-result-inp{background:transparent;border:none;border-bottom:1px solid var(--g4);
  outline:none;font-family:'DM Mono',monospace;font-size:12px;color:var(--gold2);
  text-align:right;width:90px;padding:0 0 2px;}
.lev-row{display:flex;gap:3px;justify-content:flex-end;}
.lev{width:14px;height:14px;border-radius:2px;cursor:pointer;background:var(--g4);transition:.15s;}
.lev.active{opacity:1;}.lev:not(.active){opacity:.3;}
.lev.l1{background:#E05C5C;}.lev.l2{background:#CC8822;}.lev.l3{background:#BBBB22;}
.lev.l4{background:#5ACC44;}.lev.l5{background:#2E9B9B;}
.lev-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);margin-top:3px;text-align:right;}
/* smart objectives */
.smart-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;
  border-bottom:1px solid var(--g3);}
.smart-row:last-child{border-bottom:none;}
.smart-num{font-family:'DM Mono',monospace;font-size:14px;color:var(--gold);
  width:24px;flex-shrink:0;padding-top:4px;}
.smart-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--mu);
  text-transform:uppercase;width:120px;flex-shrink:0;padding-top:6px;}
/* client list */
.cli-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.cli-card{flex:1;min-width:180px;background:var(--g1);border:1px solid var(--g3);
  border-radius:4px;padding:12px 14px;cursor:pointer;transition:.15s;border-top:2px solid var(--g4);}
.cli-card:hover{border-color:var(--gold);}
.cli-card.active{border-top-color:var(--gold);background:rgba(184,151,42,.04);}
.cli-name{font-weight:500;font-size:13px;margin-bottom:3px;}
.cli-meta{font-family:'DM Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:1px;}
.cli-add{display:flex;align-items:center;justify-content:center;gap:8px;
  min-width:140px;border-style:dashed;color:var(--mu);font-size:12px;}
.cli-add:hover{color:var(--gold);border-color:var(--gold);}

/* ══ DOCUMENTI (SOP) ══ */
.doc-wrap{padding:20px 22px 60px;max-width:900px;margin:0 auto;}
.sop-frame{background:var(--g1);border:1px solid var(--g3);border-radius:4px;overflow:hidden;}
.sop-toc{display:flex;flex-direction:column;}
.sop-chapter{border-bottom:1px solid var(--g3);}
.sop-chapter:last-child{border-bottom:none;}
.sop-ch-head{display:flex;align-items:center;gap:12px;padding:11px 16px;
  cursor:pointer;transition:.15s;}
.sop-ch-head:hover{background:var(--g2);}
.sop-ch-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);width:28px;flex-shrink:0;}
.sop-ch-title{font-size:12px;color:var(--wh);font-weight:500;flex:1;}
.sop-ch-arr{font-size:10px;color:var(--mu);}
.sop-ch-body{display:none;padding:14px 20px 16px 56px;background:var(--g2);

/* ══════════════════════════════════════════════════════════
   STORAGE — localStorage puro (PWA-ready)
══════════════════════════════════════════════════════════ */
function storageGet(key){
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e){ return null; }
}
function storageSet(key,val){
  try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){ console.warn('Storage pieno',e); }

function renderSOP(){
  const toc=document.getElementById('sop-toc');
  toc.innerHTML=SOP_DATA.map((ch,i)=>`
    <div class="sop-chapter">
      <div class="sop-ch-head" onclick="toggleSOPChapter(${i})">
        <span class="sop-ch-num">${ch.num}</span>
        <span class="sop-ch-title">${ch.title}</span>

      </div>
      <div class="sop-ch-body" id="sop-body-${i}">${ch.content}</div>
    </div>`).join('');

  // WhatsApp section
  document.getElementById('wapp-section').innerHTML=`
    <div style="padding:14px 16px;">
      <div style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;">Template WhatsApp — Accesso Rapido</div>

          {label:'Conferma sessione',key:'conf'},
          {label:'Check-in mensile',key:'checkin'},
          {label:'Rinnovo',key:'rinnovo'}
        ].map(t=>`<button class="btn" onclick="showTemplate('${t.key}')">${t.label}</button>`).join('')}
      </div>
      <div id="wapp-preview" style="margin-top:10px;"></div>
    </div>`;
}
